<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CivicChain — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf9f7;
        color: #22304a;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 22rem; }
      img { width: 72px; height: 72px; }
      h1 { font-size: 1.25rem; margin: 1rem 0 0.5rem; }
      p { color: #6f6b66; line-height: 1.5; }
      a {
        display: inline-block;
        margin-top: 1.25rem;
        background: #22304a;
        color: #fff;
        text-decoration: none;
        padding: 0.6rem 1.1rem;
        border-radius: 0.6rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icon-192.png" alt="CivicChain" />
      <h1>You're offline</h1>
      <p>
        Open the report form to file a complaint now — it will be saved on your
        phone and sent automatically once you're back online.
      </p>
      <a href="/offline-report">Report an issue</a>
    </div>
  </body>
</html>
