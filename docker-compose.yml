# CivicChain local/self-hosted stack: Postgres + migrations + the Next.js app.
#
#   docker compose up --build
#
# Values are read from .env (see .env.example). For this stack to use the bundled
# Postgres, DATABASE_URL must point at the `db` service, e.g.:
#   DATABASE_URL="postgres://civicchain:civicchain@db:5432/civicchain"

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-civicchain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civicchain}
      POSTGRES_DB: ${POSTGRES_DB:-civicchain}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-civicchain} -d ${POSTGRES_DB:-civicchain}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies Prisma migrations, then exits. The app waits for this.
  migrate:
    build:
      context: .
      target: migrator
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
      args:
        # NEXT_PUBLIC_* are inlined at build time and so must be available here.
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
        NEXT_PUBLIC_MAPBOX_STYLE: ${NEXT_PUBLIC_MAPBOX_STYLE}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
